<div class="login-wrapper">
  <div class="login-card">
    <h2>Login</h2>
    <form (submit)="onSubmit($event)">
      <div class="form-group">
        <label>Usuário</label>
        <input type="text" name="username" required [disabled]="loading" />
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="password" required [disabled]="loading" />
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">Entrar</button>
      <button type="button" class="btn-secondary" (click)="onRegister()" [disabled]="loading">Criar Conta</button>
    </form>

    <div class="spinner-overlay" *ngIf="loading">
      <div class="spinner"></div>
      <p>Processando...</p>
    </div>
  </div>
</div>
